<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocuMind AI — Upload. Analyze. Understand.</title>
  <meta name="description"
    content="Upload any document (PDF, DOCX, TXT, CSV) and get AI-powered summaries, data extraction, and intelligent Q&A." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🧠</span>
        <span class="logo-text">DocuMind <span class="logo-ai">AI</span></span>
      </div>
      <p class="tagline">Upload any document. Ask anything.</p>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">

    <!-- UPLOAD ZONE -->
    <section class="card upload-card" id="uploadSection">
      <h2 class="section-title">Upload Your Document</h2>
      <div class="drop-zone" id="dropZone" tabindex="0" role="button" aria-label="Click or drag to upload a document">
        <div class="drop-icon">📄</div>
        <p class="drop-title">Drag & drop your file here</p>
        <p class="drop-sub">or <label class="browse-link" for="fileInput">browse to upload</label></p>
        <input type="file" id="fileInput" accept=".pdf,.docx,.txt,.csv" hidden />
        <div class="file-types">
          <span class="chip chip-pdf">PDF</span>
          <span class="chip chip-docx">DOCX</span>
          <span class="chip chip-txt">TXT</span>
          <span class="chip chip-csv">CSV</span>
        </div>
        <p class="drop-limit">Max 10 MB</p>
      </div>

      <!-- Progress -->
      <div class="progress-wrap hidden" id="progressWrap">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        <p class="progress-label" id="progressLabel">Uploading…</p>
      </div>

      <!-- File preview chip -->
      <div class="file-preview hidden" id="filePreview">
        <span class="file-icon" id="fileIcon">📄</span>
        <div class="file-info">
          <span class="file-name" id="fileName"></span>
          <span class="file-size" id="fileSize"></span>
        </div>
        <button class="btn-remove" id="btnRemove" title="Remove file">✕</button>
      </div>

      <!-- Error / status message -->
      <div class="alert alert-error hidden" id="uploadError" role="alert"></div>
    </section>

    <!-- ANALYSIS PANEL -->
    <section class="card analysis-card hidden" id="analysisSection">
      <!-- Stat chips -->
      <div class="stats-row" id="statsRow">
        <div class="stat-chip">
          <span class="stat-label">Words</span>
          <span class="stat-value" id="statWords">—</span>
        </div>
        <div class="stat-chip">
          <span class="stat-label">Pages</span>
          <span class="stat-value" id="statPages">—</span>
        </div>
        <div class="stat-chip">
          <span class="stat-label">Read time</span>
          <span class="stat-value" id="statRead">—</span>
        </div>
        <div class="stat-chip">
          <span class="stat-label">Type</span>
          <span class="stat-value" id="statType">—</span>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="action-row">
        <button class="btn btn-primary" id="btnSummarize">
          <span class="btn-icon">✨</span> Summarize
        </button>
        <button class="btn btn-secondary" id="btnExtract">
          <span class="btn-icon">🔍</span> Extract Data
        </button>
        <button class="btn btn-ghost" id="btnNewFile">
          <span class="btn-icon">📂</span> New File
        </button>
      </div>

      <!-- Skeleton loaders -->
      <div class="skeleton-wrap hidden" id="skeletonWrap">
        <div class="skeleton skeleton-line wide"></div>
        <div class="skeleton skeleton-line medium"></div>
        <div class="skeleton skeleton-line wide"></div>
        <div class="skeleton skeleton-line short"></div>
        <div class="skeleton skeleton-line medium"></div>
      </div>

      <!-- Result panel -->
      <div class="result-panel hidden" id="resultPanel">
        <div class="result-toolbar">
          <h3 class="result-title" id="resultTitle">Summary</h3>
          <div class="result-actions">
            <button class="btn-tool" id="btnCopy" title="Copy to clipboard">📋 Copy</button>
          </div>
        </div>
        <div class="result-content markdown-body" id="resultContent"></div>
      </div>
    </section>

    <!-- CHAT SECTION -->
    <section class="card chat-card hidden" id="chatSection">
      <h2 class="section-title">
        <span class="chat-icon">💬</span> Chat with Document
      </h2>

      <!-- Chat window -->
      <div class="chat-window" id="chatWindow" aria-live="polite" aria-label="Conversation">
        <div class="chat-empty" id="chatEmpty">
          <p>Ask anything about your document…</p>
          <div class="suggestions" id="suggestions">
            <button class="suggestion-chip" data-q="What is this document about?">What is this document about?</button>
            <button class="suggestion-chip" data-q="Summarize the key findings">Summarize the key findings</button>
            <button class="suggestion-chip" data-q="What are the main conclusions?">What are the main
              conclusions?</button>
          </div>
        </div>
      </div>

      <!-- Input bar -->
      <div class="chat-input-bar">
        <textarea id="chatInput" class="chat-input" placeholder="Ask a question about your document…" rows="1"
          aria-label="Chat input"></textarea>
        <button class="btn-send" id="btnSend" aria-label="Send message">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p>Powered by <strong>Advanced AI</strong> · Built with FastAPI</p>
  </footer>

  <script src="app.js"></script>
</body>

</html>
